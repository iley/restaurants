{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Restaurants{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'restaurants/bulma.min.css' %}">
  <script src="{% static 'restaurants/htmx.min.js' %}" defer></script>
  <style>
    .navbar.is-dark .navbar-dropdown { border-top: none; padding-top: 0; }
    .sort-header { color: inherit; text-decoration: none; white-space: nowrap; }
    .sort-header:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav class="navbar is-dark" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="/">My Restaurants List</a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="navMenu" class="navbar-menu">
      <div class="navbar-start">
        <div class="navbar-item has-dropdown is-hoverable">
          <a class="navbar-link">{{ city.name }}</a>
          <div class="navbar-dropdown">
            {% for c in cities %}
              <a class="navbar-item {% if c.slug == city.slug %}is-active{% endif %}"
                 href="{% url 'restaurant_list' city_slug=c.slug %}">
                {{ c.name }}
              </a>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</section>

<script>
  // Bulma navbar burger toggle
  document.addEventListener("DOMContentLoaded", () => {
    const burger = document.querySelector(".navbar-burger");
    const menu = document.getElementById(burger.dataset.target);
    burger.addEventListener("click", () => {
      burger.classList.toggle("is-active");
      menu.classList.toggle("is-active");
    });
  });
</script>

</body>
</html>
