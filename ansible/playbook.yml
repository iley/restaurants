---
- name: Deploy restaurants app
  hosts: restaurants
  become: true

  tasks:
    # --- EBS Volume ---
    # Nitro-based instances (t4g) expose EBS volumes as /dev/nvme*n1, not
    # the /dev/xvdf name requested in Terraform. We find the actual device,
    # label the filesystem, and mount by label so it survives device reordering.
    - name: Find data volume device
      shell: |
        for dev in /dev/xvdf /dev/nvme1n1; do
          if [ -b "$dev" ]; then
            echo "$dev"
            exit 0
          fi
        done
        echo "No data volume device found" >&2
        exit 1
      register: data_device
      changed_when: false

    - name: Create filesystem on data volume
      filesystem:
        fstype: ext4
        dev: "{{ data_device.stdout }}"
        opts: "-L restaurants-data"

    - name: Mount data volume by label
      mount:
        path: "{{ data_dir }}"
        src: "LABEL=restaurants-data"
        fstype: ext4
        state: mounted

    - name: Create data subdirectories
      file:
        path: "{{ item }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"
      loop:
        - "{{ data_dir }}"
        - "{{ media_dir }}"
        - "{{ static_dir }}"
        - "{{ tiles_dir }}"

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Install nginx
      dnf:
        name: nginx
        state: present

    - name: Deploy nginx configuration
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/conf.d/restaurants.conf
        mode: "0644"
      notify: Reload nginx

    - name: Remove default nginx config
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      notify: Reload nginx

    - name: Start and enable nginx
      systemd:
        name: nginx
        state: started
        enabled: true

    # Docker bind-mounts create missing paths as directories, but SQLite
    # needs a regular file. Touch it so the first deploy works.
    - name: Ensure database file exists
      file:
        path: "{{ db_path }}"
        state: touch
        owner: ec2-user
        group: ec2-user
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Deploy container service unit
      template:
        src: templates/restaurants.service.j2
        dest: /etc/systemd/system/restaurants.service
        mode: "0644"
      notify: Restart restaurants

    - name: Pull latest app image
      command: docker pull {{ app_image }}
      register: docker_pull
      changed_when: "'Downloaded newer image' in docker_pull.stdout or 'Pull complete' in docker_pull.stdout"
      notify: Restart restaurants

    - name: Enable and start restaurants service
      systemd:
        name: restaurants
        daemon_reload: true
        enabled: true
        state: started

    - name: Prune old Docker images
      command: docker image prune -af --filter "until=168h"
      changed_when: false

    # --- Backups ---

    - name: Install sqlite and bzip2
      dnf:
        name:
          - sqlite
          - bzip2
        state: present

    - name: Check if restic is installed
      stat:
        path: /usr/local/bin/restic
      register: restic_bin

    - name: Download restic binary
      get_url:
        url: https://github.com/restic/restic/releases/download/v0.17.3/restic_0.17.3_linux_arm64.bz2
        dest: /tmp/restic.bz2
        mode: "0644"
      when: not restic_bin.stat.exists

    - name: Extract restic binary
      shell: bunzip2 -c /tmp/restic.bz2 > /usr/local/bin/restic && chmod 0755 /usr/local/bin/restic
      when: not restic_bin.stat.exists

    - name: Deploy backup script
      template:
        src: templates/backup.sh.j2
        dest: /usr/local/bin/backup-restaurants.sh
        mode: "0700"

    - name: Deploy backup service unit
      template:
        src: templates/backup.service.j2
        dest: /etc/systemd/system/backup-restaurants.service
        mode: "0644"

    - name: Deploy backup timer unit
      template:
        src: templates/backup.timer.j2
        dest: /etc/systemd/system/backup-restaurants.timer
        mode: "0644"

    - name: Initialize restic repository
      command: restic init
      environment:
        AWS_ACCESS_KEY_ID: "{{ backup_aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ backup_aws_secret_access_key }}"
        RESTIC_REPOSITORY: "s3:s3.{{ backup_s3_region }}.amazonaws.com/{{ backup_bucket }}"
        RESTIC_PASSWORD: "{{ restic_password }}"
      register: restic_init
      failed_when: restic_init.rc != 0 and 'already initialized' not in restic_init.stderr
      changed_when: restic_init.rc == 0

    - name: Enable and start backup timer
      systemd:
        name: backup-restaurants.timer
        daemon_reload: true
        enabled: true
        state: started

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Restart restaurants
      systemd:
        name: restaurants
        daemon_reload: true
        state: restarted
